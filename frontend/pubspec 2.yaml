name: aurix
description: Aurix - eGold marketplace application
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  provider: ^6.1.2
  dio: ^5.4.0
  fl_chart: ^0.68.0
  intl: ^0.19.0
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true

  assets:
    - assets/images/aurix_logo.png
    - assets/images/google_logo.png
    - assets/images/apple_logo.png